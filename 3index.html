<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunum Sayfası | 3Index</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            /* "Siyah ama biraz açık" - Modern bir antrasit tonu */
            background-color: #1e1e1e; 
            font-family: 'Inter', sans-serif;
            color: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; /* Sayfa içi kaydırmayı engeller, odağı sunuma verir */
        }

        .header {
            margin-bottom: 20px;
            text-align: center;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
            border: 1px solid #444;
        }

        .back-btn:hover {
            background-color: #444;
            transform: translateX(-5px);
        }

        /* Sunum Çerçevesi Konteynırı */
        .presentation-container {
            width: 90%;
            height: 80vh;
            max-width: 1200px;
            background: #2d2d2d;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer-text {
            margin-top: 15px;
            opacity: 0.6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <a href="2index.html" class="back-btn">← Geri Dön</a>

    <div class="header">
        <h1>Google Slides Sunumu</h1>
        <p>Aşağıdaki panelden sunumu inceleyebilirsiniz.</p>
    </div>

    <div class="presentation-container">
        <iframe 
            src="https://docs.google.com/presentation/d/1c65s7VnE0wgvrDp4DxyVK_sb48gROO-l1BVI9BSrmtc/embed?start=false&loop=false&delayms=3000" 
            allowfullscreen="true" 
            mozallowfullscreen="true" 
            webkitallowfullscreen="true">
        </iframe>
    </div>

    <p class="footer-text">3Index Sunum Görüntüleyici</p>

</body>
</html>
