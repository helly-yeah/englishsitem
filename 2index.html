<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Sayfa | EnglishSitem</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f8f9fa;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-color: #1a1a1b;
            --accent-color: #6366f1;
            --button-bg: #eeeeee;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.05);
            --transition-speed: 0.3s;
            --sidebar-width: 260px;
        }

        .dark {
            --bg-color: #121212;
            --sidebar-bg: #1e1e1e;
            --card-bg: #2d2d2d;
            --text-color: #f3f4f6;
            --accent-color: #818cf8;
            --button-bg: #3d3d3d;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color var(--transition-speed), color var(--transition-speed);
            display: flex;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 80px; /* Buton için yer açıldı */
            transition: transform var(--transition-speed), width var(--transition-speed);
            z-index: 1000;
        }

        /* Sidebar Kapalıyken */
        .sidebar.closed {
            transform: translateX(-100%);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 40px;
            width: 100%;
            transition: margin-left var(--transition-speed);
        }

        .main-content.expanded {
            margin-left: 0;
        }

        /* Menü Açma/Kapama Butonu (Hamburger) */
        .toggle-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1100;
            background: var(--accent-color);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Tema Butonu */
        .theme-btn {
            background-color: var(--button-bg);
            color: var(--text-color);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        /* Kartlar ve Görsel */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-10px); }

        .image-link-container { display: block; margin-bottom: 50px; text-decoration: none; color: inherit; }

        .custom-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 24px;
        }

        /* Mobil Ayarlar */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
                padding-top: 80px;
            }
            .sidebar:not(.closed) {
                box-shadow: 0 0 50px rgba(0,0,0,0.5);
            }
        }
    </style>
</head>
<body class="dark"> <button class="toggle-btn" onclick="toggleSidebar()">
        ☰
    </button>

    <aside class="sidebar" id="sidebar">
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
            <span id="btnIcon">🌙</span> <span id="btnText">Koyu Mod</span>
        </button>
    </aside>

    <main class="main-content" id="mainContent">
        <h1>Siteme Hoş Geldin 👋</h1>
        
        <a href="3index.html" class="image-link-container">
            <img src="https://picsum.photos/1000/500?education" alt="Görsel" class="custom-image">
            <span style="display:block; text-align:center; font-size:1.4rem; font-weight:600; margin-top:15px;">Güncel Sunuma Gitmek İçin Tıkla 🚀</span>
        </a>

        <div class="card-container">
            <div class="card"><h3>📚 Pratik Kelimeler</h3><p>Günlük hayatta en çok kullanılan kelimeler.</p></div>
            <div class="card"><h3>✍️ Dil Bilgisi</h3><p>Karmaşık kuralların basit anlatımı.</p></div>
            <div class="card"><h3>🎧 Dinleme</h3><p>Dinleyerek pekiştirin.</p></div>
        </div>
    </main>

    <script>
        // SIDEBAR KONTROLÜ
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            sidebar.classList.toggle('closed');
            mainContent.classList.toggle('expanded');
        }

        // TEMA KONTROLÜ
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            document.body.classList.add('dark');
            updateUI(true);
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateUI(isDark);
        }

        function updateUI(isDark) {
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            btnText.innerText = isDark ? "Açık Mod" : "Koyu Mod";
            btnIcon.innerText = isDark ? "☀️" : "🌙";
        }
    </script>
</body>
</html>
