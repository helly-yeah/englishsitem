<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Sayfa | EnglishSitem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-color: #1a1a1b;
            --accent-color: #6366f1;
            --button-bg: #eeeeee;
            --sidebar-width: 260px;
        }

        body.dark {
            --bg-color: #121212;
            --sidebar-bg: #1e1e1e;
            --card-bg: #2d2d2d;
            --text-color: #f3f4f6;
            --accent-color: #818cf8;
            --button-bg: #3d3d3d;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            transition: 0.3s;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .sidebar.closed { transform: translateX(-260px); }

        /* Üst Buton Grubu (Yan yana) */
        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 10px; /* Butonlar arası boşluk */
            padding: 20px;
        }

        .icon-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .icon-btn.mode-toggle {
            background: var(--button-bg);
            color: var(--text-color);
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* Sidebar Kapalıyken Çıkan Buton */
        .open-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 900;
            background: var(--accent-color);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            display: none;
        }

        .sidebar.closed + .open-btn { display: flex; align-items: center; justify-content: center; }

        .nav-menu { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }

        .nav-item {
            text-decoration: none;
            color: var(--text-color);
            padding: 12px;
            background: var(--button-bg);
            border-radius: 10px;
            font-weight: 600;
            text-align: center;
            transition: 0.2s;
        }

        .nav-item:hover { background: var(--accent-color); color: white; }

        .main-content {
            margin-left: var(--sidebar-width);
            width: 100%;
            padding: 40px;
            transition: 0.3s;
        }

        .main-content.expanded { margin-left: 0; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding-top: 80px; }
            .open-btn { display: flex !important; }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="icon-btn" onclick="toggleMenu()">☰</button>
            <button class="icon-btn mode-toggle" onclick="toggleTheme()" title="Mod Değiştir">🌓</button>
        </div>
        
        <div class="nav-menu">
            <h4 style="opacity: 0.5; margin-bottom: 5px; font-size: 12px; letter-spacing: 1px;">SINIFLAR</h4>
            <a href="4index.html" class="nav-item">7. Sınıf Sunumları</a>
            <a href="#" class="nav-item">8. Sınıf Sunumları</a>
            <a href="dersler.html" class="nav-item">Dil Bilgisi</a>
        </div>
    </aside>

    <button class="open-btn" onclick="toggleMenu()">☰</button>

    <main class="main-content" id="main">
        <h1>Hoş Geldin 👋</h1>
        <p>Menüden derslerini seçebilir, temayı istediğin gibi ayarlayabilirsin.</p>

        <img src="https://picsum.photos/1200/400?english" style="width:100%; border-radius: 20px; margin-top: 20px;" alt="Banner">

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px;">
            <div style="background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <h3>📚 Kelime Kartları</h3>
                <p>Yeni kelimeleri eğlenerek öğren.</p>
            </div>
            <div style="background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <h3>📝 Testler</h3>
                <p>Kendini denemeye ne dersin?</p>
            </div>
        </div>
    </main>

    <script>
        // TEMA YÖNETİMİ
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.className = savedTheme;

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // MENÜ YÖNETİMİ
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('main');
            
            if (window.innerWidth > 768) {
                sidebar.classList.toggle('closed');
                main.classList.toggle('expanded');
            } else {
                sidebar.classList.toggle('active');
            }
        }
    </script>
</body>
</html>
