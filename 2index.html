<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Sayfa | EnglishSitem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-color: #1a1a1b;
            --accent-color: #6366f1;
            --button-bg: #eeeeee;
            --sidebar-width: 260px;
        }

        body.dark {
            --bg-color: #121212;
            --sidebar-bg: #1e1e1e;
            --card-bg: #2d2d2d;
            --text-color: #f3f4f6;
            --accent-color: #818cf8;
            --button-bg: #3d3d3d;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            transition: background 0.3s;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .sidebar.closed { transform: translateX(-260px); }

        /* Buton Alanı (Sidebar'ın En Üstü) */
        .sidebar-header {
            display: flex;
            justify-content: flex-end; /* Butonu sağa yaslar */
            padding: 15px;
        }

        .toggle-btn-inside {
            background: var(--accent-color);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Sidebar Kapalıyken Çıkan Buton */
        .open-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 900;
            background: var(--accent-color);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            display: none;
        }

        .sidebar.closed + .open-btn { display: flex; align-items: center; justify-content: center; }

        .nav-menu { padding: 10px 20px; display: flex; flex-direction: column; gap: 10px; }

        .nav-item {
            text-decoration: none;
            color: var(--text-color);
            padding: 12px;
            background: var(--button-bg);
            border-radius: 10px;
            font-weight: 600;
            text-align: center;
            transition: 0.2s;
        }

        .nav-item:hover { background: var(--accent-color); color: white; }

        .theme-btn {
            margin: auto 20px 30px 20px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: var(--accent-color);
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            width: 100%;
            padding: 40px;
            transition: 0.3s;
        }

        .main-content.expanded { margin-left: 0; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding-top: 80px; }
            .open-btn { display: flex !important; }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="toggle-btn-inside" onclick="toggleMenu()">☰</button>
        </div>
        
        <div class="nav-menu">
            <h4 style="text-align: center; opacity: 0.5; margin-bottom: 5px;">SINIFLAR</h4>
            <a href="4index.html" class="nav-item">7. Sınıf Sunumları</a>
            <a href="#" class="nav-item">8. Sınıf Sunumları</a>
            <a href="dersler.html" class="nav-item">Dil Bilgisi</a>
        </div>

        <button class="theme-btn" onclick="toggleTheme()">Görünümü Değiştir 🌓</button>
    </aside>

    <button class="open-btn" onclick="toggleMenu()">☰</button>

    <main class="main-content" id="main">
        <h1>Hoş Geldin 👋</h1>
        <p>İngilizce öğrenme serüvenine kaldığın yerden devam et.</p>

        <img src="https://picsum.photos/1000/400?education" style="width:100%; border-radius: 20px; margin-top: 20px;" alt="Banner">

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px;">
            <div style="background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <h3 style="color: var(--accent-color);">📚 Kelimeler</h3>
                <p>Yeni kelimeler keşfet.</p>
            </div>
            <div style="background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <h3 style="color: var(--accent-color);">✍️ Gramer</h3>
                <p>Kuralları hatırla.</p>
            </div>
        </div>
    </main>

    <script>
        // Tema Ayarı
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.className = savedTheme;

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Menü Ayarı
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('main');
            
            if (window.innerWidth > 768) {
                sidebar.classList.toggle('closed');
                main.classList.toggle('expanded');
            } else {
                sidebar.classList.toggle('active');
            }
        }
    </script>
</body>
</html>
