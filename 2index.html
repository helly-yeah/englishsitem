<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Sayfa | EnglishSitem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-color: #1a1a1b;
            --accent-color: #6366f1;
            --button-bg: #eeeeee;
            --sidebar-width: 260px;
        }

        /* Karanlık Mod Değişkenleri */
        body.dark {
            --bg-color: #121212;
            --sidebar-bg: #1e1e1e;
            --card-bg: #2d2d2d;
            --text-color: #f3f4f6;
            --accent-color: #818cf8;
            --button-bg: #3d3d3d;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            transition: background 0.3s, color 0.3s;
        }

        /* Hamburger Menü Butonu */
        .toggle-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 2000;
            background: var(--accent-color);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Sidebar Tasarımı */
        .sidebar {
            position: fixed;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding-top: 80px;
        }

        .sidebar.closed { transform: translateX(-260px); }

        .nav-menu { padding: 20px; display: flex; flex-direction: column; gap: 12px; }

        .nav-label { 
            text-align: center; 
            opacity: 0.5; 
            font-size: 0.85rem; 
            margin-bottom: 5px;
            font-weight: 600;
        }

        .nav-item {
            text-decoration: none;
            color: var(--text-color);
            padding: 12px;
            background: var(--button-bg);
            border-radius: 12px;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .nav-item:hover { 
            background: var(--accent-color); 
            color: white; 
            transform: scale(1.02);
        }

        /* Alt Kısımdaki Tema Butonu */
        .theme-btn {
            margin: auto 20px 30px 20px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--accent-color);
            color: white;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: opacity 0.2s;
        }

        .theme-btn:hover { opacity: 0.9; }

        /* Ana İçerik Alanı */
        .main-content {
            margin-left: var(--sidebar-width);
            width: 100%;
            padding: 40px;
            transition: margin-left 0.3s ease;
        }

        .main-content.expanded { margin-left: 0; }

        .banner-img {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .sidebar { width: 260px; transform: translateX(-260px); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; padding-top: 80px; }
        }
    </style>
</head>
<body>

    <button class="toggle-btn" onclick="toggleMenu()">☰</button>

    <aside class="sidebar" id="sidebar">
        <div class="nav-menu">
            <div class="nav-label">DERSLER</div>
            <a href="4index.html" class="nav-item">7. Sınıf Sunumları</a>
            <a href="#" class="nav-item">8. Sınıf Sunumları</a>
            <a href="dersler.html" class="nav-item">Dil Bilgisi</a>
        </div>
        
        <button class="theme-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> <span id="theme-text">Koyu Mod</span>
        </button>
    </aside>

    <main class="main-content" id="main-content">
        <h1>Hoş Geldin 👋</h1>
        <p style="opacity: 0.8; margin-bottom: 30px;">Soldaki menüden sınıfını seçerek derslere başlayabilirsin.</p>

        <img src="https://picsum.photos/1200/500?nature" class="banner-img" alt="Tanıtım">

        <div style="margin-top: 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
            <div style="background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
                <h3 style="color: var(--accent-color);">📚 Pratik Kelimeler</h3>
                <p>Ünitelerle uyumlu kelime listeleri çok yakında.</p>
            </div>
            <div style="background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
                <h3 style="color: var(--accent-color);">🎧 Dinleme</h3>
                <p>Haftalık dinleme egzersizlerini takip et.</p>
            </div>
        </div>
    </main>

    <script>
        // Tema yönetimi
        const body = document.body;
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');

        // Sayfa yüklendiğinde hafızadaki temayı uygula
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            body.classList.add('dark');
            themeIcon.innerText = "☀️";
            themeText.innerText = "Açık Mod";
        }

        function toggleTheme() {
            const isDark = body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            themeIcon.innerText = isDark ? "☀️" : "🌙";
            themeText.innerText = isDark ? "Açık Mod" : "Koyu Mod";
        }

        // Menü yönetimi
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            
            if (window.innerWidth > 768) {
                sidebar.classList.toggle('closed');
                mainContent.classList.toggle('expanded');
            } else {
                sidebar.classList.toggle('active');
            }
        }
    </script>
</body>
</html>
