<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Sayfa | EnglishSitem</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f8f9fa;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-color: #1a1a1b;
            --accent-color: #6366f1;
            --button-bg: #eeeeee;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.05);
            --transition-speed: 0.3s;
            --sidebar-width: 260px;
        }

        .dark {
            --bg-color: #121212;
            --sidebar-bg: #1e1e1e;
            --card-bg: #2d2d2d;
            --text-color: #f3f4f6;
            --accent-color: #818cf8;
            --button-bg: #3d3d3d;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color var(--transition-speed), color var(--transition-speed);
            display: flex;
            overflow-x: hidden;
        }

        /* Menü Açma/Kapama Butonu */
        .toggle-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1100;
            background: var(--accent-color);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 80px;
            transition: transform var(--transition-speed);
            z-index: 1000;
        }

        .sidebar.closed {
            transform: translateX(-100%);
        }

        /* Sidebar Linkleri */
        .sidebar-nav {
            width: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-sizing: border-box;
        }

        .nav-item {
            text-decoration: none;
            color: var(--text-color);
            padding: 12px 15px;
            border-radius: 10px;
            background: var(--button-bg);
            font-weight: 600;
            transition: 0.2s;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .nav-item:hover {
            background: var(--accent-color);
            color: white;
            transform: translateX(5px);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 40px;
            width: 100%;
            transition: margin-left var(--transition-speed);
        }

        .main-content.expanded {
            margin-left: 0;
        }

        /* Tema Butonu (Sidebar Altı) */
        .theme-btn {
            margin-top: auto;
            margin-bottom: 30px;
            background-color: var(--button-bg);
            color: var(--text-color);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Kartlar */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover { transform: translateY(-10px); }

        .custom-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .sidebar { width: 240px; }
            .main-content { margin-left: 0; padding: 20px; padding-top: 90px; }
        }
    </style>
</head>
<body>

    <button class="toggle-btn" onclick="toggleSidebar()">☰</button>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-nav">
            <h3 style="text-align: center; opacity: 0.5; font-size: 0.8rem; text-transform: uppercase;">Menü</h3>
            <a href="4index.html" class="nav-item">7. Sınıf Sunumları</a>
            <a href="#" class="nav-item">8. Sınıf Sunumları</a>
            <a href="dersler.html" class="nav-item">Dil Bilgisi</a>
        </div>

        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
            <span id="btnIcon">🌙</span> <span id="btnText">Koyu Mod</span>
        </button>
    </aside>

    <main class="main-content" id="mainContent">
        <h1>Hoş Geldin 👋</h1>
        <p style="opacity: 0.7;">İngilizce dünyasını keşfetmeye hazır mısın?</p>
        
        <a href="4index.html" style="text-decoration: none; color: inherit;">
            <img src="https://picsum.photos/1000/500?study" alt="Görsel" class="custom-image">
            <h2 style="text-align: center; margin-top: 20px;">Haftanın Dersini İncele 🚀</h2>
        </a>

        <div class="card-container">
            <a href="4index.html" style="text-decoration: none; color: inherit;">
                <div class="card">
                    <h3 style="color: var(--accent-color);">📚 Kelime Listeleri</h3>
                    <p>7. Sınıf ünitelerine göre hazırlanmış kelimeler.</p>
                </div>
            </a>
            <a href="dersler.html" style="text-decoration: none; color: inherit;">
                <div class="card">
                    <h3 style="color: var(--accent-color);">✍️ Dil Bilgisi</h3>
                    <p>Gramer kurallarını hızlıca tekrar et.</p>
                </div>
            </a>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
            document.getElementById('mainContent').classList.toggle('expanded');
        }

        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            document.body.classList.add('dark');
            updateUI(true);
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateUI(isDark);
        }

        function updateUI(isDark) {
            document.getElementById('btnText').innerText = isDark ? "Açık Mod" : "Koyu Mod";
            document.getElementById('btnIcon').innerText = isDark ? "☀️" : "🌙";
        }
    </script>
</body>
</html>
