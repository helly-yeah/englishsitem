<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Sayfa | EnglishSitem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-color: #1a1a1b;
            --accent-color: #6366f1;
            --button-bg: #eeeeee;
            --sidebar-width: 260px;
        }

        .dark {
            --bg-color: #121212;
            --sidebar-bg: #1e1e1e;
            --card-bg: #2d2d2d;
            --text-color: #f3f4f6;
            --accent-color: #818cf8;
            --button-bg: #3d3d3d;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            transition: background 0.3s;
        }

        /* Hamburger Butonu */
        .toggle-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 2000;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(0,0,0,0.1);
            transition: 0.3s;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding-top: 70px;
        }

        .sidebar.closed { transform: translateX(-260px); }

        .nav-menu { padding: 20px; display: flex; flex-direction: column; gap: 10px; }

        .nav-item {
            text-decoration: none;
            color: var(--text-color);
            padding: 12px;
            background: var(--button-bg);
            border-radius: 10px;
            font-weight: 600;
            text-align: center;
            transition: 0.2s;
        }

        .nav-item:hover { background: var(--accent-color); color: white; }

        .theme-btn {
            margin: auto 20px 30px 20px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: var(--accent-color);
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            width: 100%;
            padding: 40px;
            transition: 0.3s;
        }

        .main-content.expanded { margin-left: 0; }

        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; left: -100%; }
            .sidebar.active { left: 0; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

    <button class="toggle-btn" onclick="toggleMenu()">☰</button>

    <aside class="sidebar" id="sidebar">
        <div class="nav-menu">
            <h3 style="text-align: center; opacity: 0.6;">Dersler</h3>
            <a href="4index.html" class="nav-item">7. Sınıf Sunumları</a>
            <a href="#" class="nav-item">8. Sınıf Sunumları</a>
            <a href="dersler.html" class="nav-item">Dil Bilgisi</a>
        </div>
        <button class="theme-btn" onclick="changeTheme()">Görünümü Değiştir 🌓</button>
    </aside>

    <main class="main-content" id="main">
        <h1>Hoş Geldin 👋</h1>
        <p>Soldaki menüden sınıfını seçerek derslere başlayabilirsin.</p>

        <a href="4index.html" style="text-decoration: none; color: inherit;">
            <img src="https://picsum.photos/1000/400?english" style="width:100%; border-radius: 20px;" alt="Banner">
        </a>

        <div class="card-container">
            <div class="card"><h3>🎯 Hedef Belirle</h3><p>İngilizce öğrenmek bir yolculuktur.</p></div>
            <div class="card"><h3>🔥 İstikrarlı Ol</h3><p>Her gün 10 dakika bile yeterli.</p></div>
        </div>
    </main>

    <script>
        // Sayfa yüklendiğinde temayı hatırla
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.className = savedTheme;

        // Tema Değiştirme Fonksiyonu
        function changeTheme() {
            if (document.body.classList.contains('dark')) {
                document.body.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        // Menü Aç/Kapat
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('main');
            
            if (window.innerWidth > 768) {
                sidebar.classList.toggle('closed');
                main.classList.toggle('expanded');
            } else {
                sidebar.classList.toggle('active');
            }
        }
    </script>
</body>
</html>
